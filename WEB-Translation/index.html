<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网站翻译器</title>
<style>
body{ font-family:-apple-system; background:#0f1115; color:white; text-align:center; padding-top:50px; }
input{width:400px; padding:12px; border-radius:8px; border:none;}
button{padding:12px 20px; margin-left:10px; border:none; border-radius:8px; background:#007aff; color:white; cursor:pointer;}
#iframeContainer{ margin-top:20px; width:100%; height:80vh; }
iframe{ width:100%; height:100%; border:none; }
</style>
</head>
<body>

<h1>🌍 网站翻译为中文</h1>

<input id="url" placeholder="输入网站网址，例如 github.com" />
<button id="btn">翻译为中文</button>

<div id="iframeContainer">
<iframe id="viewer"></iframe>
</div>

<script src="script.js"></script>
</body>
</html>
